<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assests/android-chrome-512x512.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <section class="allElem">
            <header>
                <div class="time-container">
                    <div class="date "><img src="assests/cal-SVG.svg" alt=""><div id="date12">4 May, 2025</div></div>
                    <div class="time"></div>
                    <div class="day">Sunday</div>
                    <div class="location "><img src="assests/loca-SVG.svg" alt="">Varanasi</div>
                </div>
                <div class="weather-container">
                    <div class="sub-container">
                        <img src="assests/SVG.svg" alt="">
                        <div class="temp">20°C</div>
                        <div class="temp-info">Light rain</div>
                    </div>
                    <div class="line"></div>
                    <div class="sub-container">
                        <div class="w-sub-container">
                            <div class="box">
                                <img src="assests/SVG-1.svg" alt="">
                                <div class="preci-container2">Heat Index
                                    <div id="preci-val"></div>
                                </div>
                            </div>
                            <div class="box">
                                <img src="assests/SVG-2.svg" alt="">
                                <div class="preci-container2">Humidity
                                    <div id="humidity-val"></div>
                                </div>
                            </div>
                            <div class="box">
                                <img src="assests/SVG-3.svg" alt="">
                                <div class="preci-container2">Wind
                                    <div id="wind-val"></div>
                                </div>
                            </div>
                        </div>

                    </div>
            </header>
            <div class="card">

                <div class="todo elem" id="0">
                    
                    <img src="https://images.unsplash.com/photo-1775656926048-16743f9a6c7a?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDI3fENEd3V3WEpBYkV3fHxlbnwwfHx8fHw%3D"
                        alt="">
                    <h2><img class='icons' src="assests/Task.svg" alt="">To Do List</h2>
                </div>
            </div>
            <div class="card">

                <div class="daily elem" id="1">
                    <img src="https://images.unsplash.com/photo-1777324369706-609d83aece87?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDh8Q0R3dXdYSkFiRXd8fGVufDB8fHx8fA%3D%3D"
                        alt="">
                    <h2>
                        <img class='icons' src="assests/Calendar.svg" alt="">
                        Daily Planner

                    </h2>
                </div>
            </div>
            <div class="card">

                <div class="motivation elem" id="2">
                    <img src="https://images.unsplash.com/photo-1777972094693-9084fc20d5b3?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDI5fENEd3V3WEpBYkV3fHxlbnwwfHx8fHw%3D"
                        alt="">
                    <h2>
                        <img class='icons' src="assests/Moti.svg" alt="">
                        Motivational Quotes
                    </h2>
                </div>
            </div>
            <div class="card">

                <div class="quotes elem" id="3">
                    <img src="https://images.unsplash.com/photo-1777646346045-df4bd1114148?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDU2fENEd3V3WEpBYkV3fHxlbnwwfHx8fHw%3D"
                        alt="">
                    <h2>
                        <img class='icons' src="assests/Timer.svg" alt="">
                        Pomodoro Timer
                    </h2>
                </div>
            </div>
            <div class="card">

                <div class="goal elem" id="4">
                    <img src="https://images.unsplash.com/photo-1777971911576-de6d56a93681?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDU3fENEd3V3WEpBYkV3fHxlbnwwfHx8fHw%3D"
                        alt="">
                    <h2>
                        <img class='icons' src="assests/Goal.svg" alt="">
                        Daily Goals
                    </h2>
                </div>
            </div>
        </section>
        <section class="fullElem" id="to_do_page">
            <div class=" back close-container" id='0'>
                <div class="leftright"></div>
                <div class="rightleft"></div>
                <label class="close1">close</label>
            </div>
            <h2>
                Your Personalized Task List
            </h2>
            <div class="todo-container">
                <div class="addTask">
                    <form>
                        <input type="text" id="task-input" placeholder="Enter Task">
                        <textarea placeholder="Enter Details" name="" id=""></textarea>
                        <div class="mark-imp">
                            <input type="checkbox" id="checkbox">
                            <label for="checkbox">Mark as Important</label>
                        </div>
                        <button class="learn-more">Add Task</button>
                    </form>

                </div>
                <div class="allTask">

                </div>
            </div>
        </section>
        <section class="fullElem" id="daily_planner_page">
            <div class=" back close-container" id='1'>
                <div class="leftright"></div>
                <div class="rightleft"></div>
                <label class="close1">close</label>
            </div>
            <h2>Plan Your day to be more Productive</h2>
            <div class="day-planner">

            </div>
        </section>
        <section class="fullElem" id="motivation_page">
            <div class="motivation_page_container">
                <div class=" back close-container" id='2'>
                    <div class="leftright"></div>
                    <div class="rightleft"></div>
                    <label class="close1">close</label>
                </div>
                <div class="motivation-container">
                    <div class="motivation-wrapper">
                        <img src="assests/icons8-quotes-64.png" alt="">
                        <div class="motivation-1">
                            <h2>Quote of the Day</h2>
                        </div>
                        <div class="motivation-2">
                            <h1></h1>
                        </div>
                        <div class="motivation-3">
                            <h2></h2>
                        </div>
                    </div>

                </div>
            </div>
        </section>
        <section class="fullElem" id="pomodore_timer_page">
            <div class=" back close-container" id='3'>
                <div class="leftright"></div>
                <div class="rightleft"></div>
                <label class="close1">close</label>
            </div>
            <h2>
                Study With Me!
            </h2>
            <h4 class="session">Work Session</h4>
            <div class="pomo-timer">
                <h1>25:00</h1>
                <button class="start-timer">Start</button>
                <button class="pause-timer">Pause</button>
                <button class="reset-timer">Reset</button>
            </div>
        </section>
        <section class="fullElem" id="daily_goals_page">
            <div class=" back close-container" id='4'>
                <div class="leftright"></div>
                <div class="rightleft"></div>
                <label class="close1">close</label>
            </div>
            <h1>
                Daily Goals
            </h1>
        </section>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
