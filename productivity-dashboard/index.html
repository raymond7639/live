<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <nav>

        </nav>
        <section class="allElem">
            <div class="todo elem" id="0">
                <img src="https://images.unsplash.com/photo-1775656926048-16743f9a6c7a?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDI3fENEd3V3WEpBYkV3fHxlbnwwfHx8fHw%3D"
                    alt="">
                <h2>To Do List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="https://images.unsplash.com/photo-1777324369706-609d83aece87?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDh8Q0R3dXdYSkFiRXd8fGVufDB8fHx8fA%3D%3D"
                    alt="">
                <h2>
                    Daily Planner

                </h2>
            </div>
            <div class="motivation elem" id="2">
                <img src="https://images.unsplash.com/photo-1777972094693-9084fc20d5b3?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDI5fENEd3V3WEpBYkV3fHxlbnwwfHx8fHw%3D"
                    alt="">
                <h2>
                    Motivation
                </h2>
            </div>
            <div class="quotes elem" id="3">
                <img src="https://images.unsplash.com/photo-1777646346045-df4bd1114148?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDU2fENEd3V3WEpBYkV3fHxlbnwwfHx8fHw%3D"
                    alt="">
                <h2>
                    Daily Quotes
                </h2>
            </div>
            <div class="goal elem" id="4">
                <img src="https://images.unsplash.com/photo-1777971911576-de6d56a93681?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDU3fENEd3V3WEpBYkV3fHxlbnwwfHx8fHw%3D"
                    alt="">
                <h2>
                    Daily Goals
                </h2>
            </div>
        </section>
        <!-- FUll elements goes here -->
        <section class="fullElem" id="to_do_page">
            <button class="back" id="0">

                <i class="ri-close-line"></i>
            </button>
            <h2>
                Your Personalized Task List
            </h2>
            <div class="todo-container">
                <div class="addTask">
                    <form>
                        <input type="text" id="task-input" placeholder="Enter Task">
                        <textarea placeholder="Enter Details" name="" id=""></textarea>
                        <div class="mark-imp">
                            <input type="checkbox" id="checkbox">
                            <label for="checkbox">Mark as Important</label>
                        </div>
                        <button>Add Task</button>
                    </form>

                </div>
                <div class="allTask">

                </div>
            </div>
        </section>
        <section class="fullElem" id="daily_planner_page">
            <button class="back" id="1">

                <i class="ri-close-line"></i>
            </button>
            <h2>Plan Your day to be more Productive</h2>
            <div class="day-planner">

            </div>
        </section>
        <section class="fullElem" id="motivation_page">
            <button class="back" id="2"><i class="ri-close-line"></i></button>
            <div class="motivation-container">
                <div class="motivation-wrapper">
                    <img src="assests/icons8-quotes-64.png" alt="">
                    <div class="motivation-1">
                        <h2>Quote of the Day</h2>
                    </div>
                    <div class="motivation-2">
                        <h1></h1>
                    </div>
                    <div class="motivation-3">
                        <h2></h2>
                    </div>
                </div>

            </div>
        </section>
        <section class="fullElem" id="daily_quotes_page">
            <button class="back" id="3">

                <i class="ri-close-line"></i>
            </button>
            <h1>
                Daily Quotes
            </h1>
        </section>
        <section class="fullElem" id="daily_goals_page">
            <button class="back" id="4">

                <i class="ri-close-line"></i>
            </button>
            <h1>
                Daily Goals
            </h1>
        </section>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
